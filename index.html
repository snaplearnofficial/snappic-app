<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snappic - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #8a2be2;
            --primary-gradient: linear-gradient(135deg, #8a2be2 0%, #ff6b6b 100%);
            --secondary: #ff6b6b;
            --bg-color: #f3f4f6;
            --surface: #ffffff;
            --surface-glass: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border: rgba(229, 231, 235, 0.8);
            --border-focus: #8a2be2;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-full: 9999px;
            --danger: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; min-height: 100vh; }
        .hidden { display: none !important; }
        input, textarea, button { font-family: inherit; outline: none; }
        button { cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Auth */
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; background: var(--primary-gradient); }
        .auth-card { background: var(--surface-glass); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 420px; box-shadow: var(--shadow-glass); }

        /* Header */
        .app-header { background: var(--surface-glass); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; padding: 12px 20px; }
        .app-header-content { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .app-logo { font-size: 24px; font-weight: 700; background: var(--primary-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .search-container { position: relative; flex: 1; max-width: 400px; }
        .search-bar { width: 100%; padding: 10px 16px 10px 40px; border-radius: var(--radius-full); border: 1px solid var(--border); background: var(--bg-color); font-size: 14px; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-results { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: white; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); overflow: hidden; display: none; z-index: 200; }
        .search-result-item { padding: 12px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.2s; }
        .search-result-item:hover { background: var(--bg-color); }

        .app-header-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn { width: 40px; height: 40px; border-radius: var(--radius-full); background: transparent; border: none; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--text-main); position: relative; }
        .icon-btn:hover { background: rgba(0,0,0,0.05); color: var(--primary); }
        .badge { position: absolute; top: 5px; right: 5px; width: 10px; height: 10px; background: var(--secondary); border-radius: 50%; border: 2px solid white; display: none; }

        /* Main Content */
        .app-main { max-width: 1000px; margin: 0 auto; padding: 24px 20px; display: grid; grid-template-columns: 1fr 320px; gap: 40px; }
        @media (max-width: 850px) { .app-main { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* Post Card */
        .post-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow-sm); }
        .post-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .post-author { display: flex; gap: 12px; align-items: center; cursor: pointer; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary-gradient); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; }
        .avatar.large { width: 80px; height: 80px; font-size: 32px; }
        .post-image { width: 100%; max-height: 600px; object-fit: cover; }
        .post-actions { padding: 12px 16px; display: flex; gap: 16px; font-size: 24px; }
        .post-stats { padding: 0 16px 8px; font-weight: 600; font-size: 14px; }
        .post-caption { padding: 0 16px 12px; font-size: 14px; line-height: 1.4; }
        .post-comments { padding: 0 16px 12px; font-size: 13px; border-top: 1px solid var(--border); padding-top: 12px; }
        .comment-input-box { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
        .comment-input-box input { flex: 1; border: none; font-size: 14px; }

        /* Sidebar */
        .sidebar { position: sticky; top: 100px; }
        .user-card { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; text-align: center; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .stat-box { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .stat-item { text-align: center; }
        .stat-val { font-weight: 700; font-size: 18px; }
        .stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px; }
        .modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 500px; padding: 24px; box-shadow: var(--shadow-lg); position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 700; }
        .close-btn { background: none; border: none; font-size: 24px; color: var(--text-muted); }

        /* Messenger */
        .messenger-layout { display: flex; height: 500px; }
        .conv-list { width: 180px; border-right: 1px solid var(--border); overflow-y: auto; }
        .conv-item { padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
        .conv-item:hover { background: var(--bg-color); }
        .conv-item.active { background: rgba(138, 43, 226, 0.05); border-right: 3px solid var(--primary); }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .chat-msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 14px; }
        .msg.mine { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.others { background: #eee; align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 10px; }
        .chat-input input { flex: 1; border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; }

        /* Notification */
        .notif-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: var(--radius-full); transition: 0.3s; z-index: 500; opacity: 0; }
        .notif-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .btn-primary { background: var(--primary-gradient); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-md); font-weight: 600; width: 100%; margin-top: 10px; }
        .btn-follow { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; }
        .btn-follow.following { background: var(--bg-color); color: var(--text-main); border: 1px solid var(--border); }

        .post-creator { background: var(--surface); padding: 16px; border-radius: var(--radius-lg); border: 1px solid var(--border); margin-bottom: 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .creator-placeholder { flex: 1; padding: 10px 20px; background: var(--bg-color); border-radius: 20px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>

<div id="authPage" class="auth-container">
    <div class="auth-card" id="loginCard">
        <h2 style="text-align: center; margin-bottom: 24px;">Snappic Login</h2>
        <div id="loginError" style="color: red; font-size: 14px; margin-bottom: 10px; display: none;"></div>
        <input type="email" id="loginEmail" class="form-input" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <input type="password" id="loginPassword" class="form-input" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <button class="btn-primary" onclick="handleLogin()">Sign In</button>
        <p style="text-align: center; margin-top: 16px; font-size: 14px;">New? <a href="#" onclick="toggleAuth()">Sign up</a></p>
    </div>
    <div class="auth-card hidden" id="signupCard">
        <h2 style="text-align: center; margin-bottom: 24px;">Create Account</h2>
        <div id="signupError" style="color: red; font-size: 14px; margin-bottom: 10px; display: none;"></div>
        <input type="text" id="signupUsername" class="form-input" placeholder="Username" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <input type="email" id="signupEmail" class="form-input" placeholder="Email" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <input type="password" id="signupPassword" class="form-input" placeholder="Password" style="width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <button class="btn-primary" onclick="handleSignup()">Create Account</button>
        <p style="text-align: center; margin-top: 16px; font-size: 14px;">Back to <a href="#" onclick="toggleAuth()">Login</a></p>
    </div>
</div>

<div id="appPage" class="hidden">
    <header class="app-header">
        <div class="app-header-content">
            <a href="#" class="app-logo" onclick="loadFeed()"><i class='bx bxs-camera'></i> Snappic</a>
            
            <div class="search-container">
                <i class='bx bx-search search-icon'></i>
                <input type="text" class="search-bar" placeholder="Search people..." oninput="handleSearch(this.value)">
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="app-header-actions">
                <button class="icon-btn" onclick="openCreateModal()"><i class='bx bx-plus-circle'></i></button>
                <button class="icon-btn" onclick="openMessenger()"><i class='bx bx-message-square-detail'></i><div class="badge" id="msgBadge"></div></button>
                <button class="icon-btn" onclick="openMyProfile()"><i class='bx bx-user'></i></button>
                <button class="icon-btn" onclick="handleLogout()"><i class='bx bx-log-out'></i></button>
            </div>
        </div>
    </header>

    <main class="app-main">
        <section class="feed-section">
            <div class="post-creator" onclick="openCreateModal()">
                <div class="avatar" id="creatorAvatar">?</div>
                <div class="creator-placeholder">Share a note or photo with everyone...</div>
            </div>
            <div id="feed"></div>
        </section>

        <aside class="sidebar">
            <div class="user-card">
                <div class="avatar large" id="sideAvatar" style="margin: 0 auto 12px;">?</div>
                <h3 id="sideName">Username</h3>
                <p id="sideUsername" style="color: var(--text-muted); font-size: 14px;">@username</p>
                <div class="stat-box">
                    <div class="stat-item">
                        <div class="stat-val" id="sidePosts">0</div>
                        <div class="stat-lbl">Posts</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-val" id="sideFollowers">0</div>
                        <div class="stat-lbl">Followers</div>
                    </div>
                </div>
            </div>
        </aside>
    </main>
</div>

<!-- Profile Modal -->
<div class="modal" id="profileModal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="profTitle">Profile</span>
            <button class="close-btn" onclick="closeModal('profileModal')"><i class='bx bx-x'></i></button>
        </div>
        <div style="text-align: center; border-bottom: 1px solid var(--border); padding-bottom: 20px;">
            <div class="avatar large" id="profAvatar" style="margin: 0 auto 12px;">?</div>
            <h2 id="profName">User Name</h2>
            <p id="profUsername" style="color: var(--text-muted); margin-bottom: 16px;">@username</p>
            <div id="profActions" style="display: flex; justify-content: center; gap: 10px;">
                <button class="btn-follow" id="followBtn" onclick="toggleFollow()">Follow</button>
                <button class="btn-follow" style="background: #333;" id="messageBtn" onclick="startChat()">Message</button>
            </div>
            <div class="stat-box" style="border: none;">
                <div class="stat-item">
                    <div class="stat-val" id="profPosts">0</div>
                    <div class="stat-lbl">Posts</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="profFollowers">0</div>
                    <div class="stat-lbl">Followers</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="profFollowing">0</div>
                    <div class="stat-lbl">Following</div>
                </div>
            </div>
        </div>
        <div id="profGrid" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<!-- Create Post Modal -->
<div class="modal" id="createModal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Create Post</span>
            <button class="close-btn" onclick="closeModal('createModal')"><i class='bx bx-x'></i></button>
        </div>
        <input type="file" id="postImage" accept="image/*" style="margin-bottom: 12px; width: 100%;">
        <textarea id="postCaption" placeholder="What's happening?" style="width: 100%; height: 100px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); resize: none; margin-bottom: 16px;"></textarea>
        <button class="btn-primary" onclick="handleCreatePost()">Post Now</button>
    </div>
</div>

<!-- Messenger Modal -->
<div class="modal" id="messengerModal">
    <div class="modal-content" style="max-width: 700px; padding: 0;">
        <div class="modal-header" style="padding: 16px 24px; margin: 0; border-bottom: 1px solid var(--border);">
            <span>Messenger</span>
            <button class="close-btn" onclick="closeModal('messengerModal')"><i class='bx bx-x'></i></button>
        </div>
        <div class="messenger-layout">
            <div class="conv-list" id="convList"></div>
            <div class="chat-area" id="chatArea">
                <div id="noChat" style="flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                    Select a user to start texting
                </div>
                <div id="activeChat" class="hidden" style="flex: 1; display: flex; flex-direction: column;">
                    <div id="chatMsgs" class="chat-msgs"></div>
                    <div class="chat-input">
                        <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendDM()">
                        <button class="icon-btn" onclick="sendDM()"><i class='bx bxs-send' style="color: var(--primary);"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="notif-toast">Success</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
</body>
</html>

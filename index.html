<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snappic | Premium Social</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #fafafa;
            --surface: #ffffff;
            --border: #dbdbdb;
            --text: #262626;
            --muted: #8e8e8e;
            --primary: #0095f6;
            --accent: #ed4956;
            --gradient: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%);
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --surface: #000000;
            --border: #262626;
            --text: #f5f5f5;
            --muted: #a8a8a8;
            --glass: rgba(0, 0, 0, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
        .hidden { display: none !important; }
        a { text-decoration: none; color: inherit; }

        /* Navigation */
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 60px; background: var(--glass); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .nav-inner { width: 100%; max-width: 975px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }
        .nav-actions { display: flex; gap: 22px; align-items: center; }
        .nav-actions i { font-size: 26px; cursor: pointer; transition: 0.2s; }
        .nav-actions i:hover { transform: scale(1.1); color: var(--primary); }

        /* Container */
        .app-container { max-width: 935px; margin: 80px auto 0; padding: 0 20px; display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        @media (max-width: 935px) { .app-container { grid-template-columns: 1fr; } .sidebar { display: none; } }

        /* Stories */
        .stories { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 24px; display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .story { text-align: center; min-width: 66px; cursor: pointer; }
        .ring { width: 66px; height: 66px; border-radius: 50%; padding: 3px; background: var(--gradient); margin-bottom: 4px; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--surface); background: #eee; display: flex; align-items: center; justify-content: center; font-weight: 700; overflow: hidden; font-size: 14px; }
        .story-name { font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }

        /* Post Card */
        .post { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 24px; overflow: hidden; box-shadow: var(--shadow); }
        .post-head { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
        .post-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .mini-avatar { width: 32px; height: 32px; border-radius: 50%; background: #eee; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; }
        .post-img-box { width: 100%; background: #000; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        .post-img { width: 100%; height: auto; object-fit: contain; }
        .post-body { padding: 12px 16px; }
        .post-btns { display: flex; gap: 18px; font-size: 26px; margin-bottom: 10px; }
        .post-btns i { cursor: pointer; transition: 0.2s; }
        .post-btns i:hover { transform: scale(1.15); }
        .likes { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
        .caption { font-size: 14px; line-height: 1.5; }
        .caption b { margin-right: 8px; }
        .view-cmts { color: var(--muted); font-size: 14px; margin-top: 8px; cursor: pointer; }
        .cmt-box { border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 12px; }
        .cmt-box input { flex: 1; border: none; background: transparent; color: var(--text); font-size: 14px; outline: none; }
        .cmt-box button { background: none; border: none; color: var(--primary); font-weight: 700; cursor: pointer; opacity: 0.5; }
        .cmt-box button:not(:disabled) { opacity: 1; }

        /* Auth */
        .auth-view { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        .auth-box { background: var(--surface); border: 1px solid var(--border); padding: 40px; width: 100%; max-width: 350px; text-align: center; border-radius: 12px; box-shadow: var(--shadow); }
        .inp { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font-size: 14px; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin: 10px 0; }
        .switch { font-size: 14px; color: var(--muted); margin-top: 20px; }
        .switch span { color: var(--primary); font-weight: 700; cursor: pointer; }

        /* Sidebar */
        .sidebar { position: sticky; top: 80px; }
        .side-me { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .big-avatar { width: 56px; height: 56px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; border: 1px solid var(--border); }

        /* Modals */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; pointer-events: none; transition: 0.25s; }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .m-card { background: var(--surface); border-radius: 16px; width: 100%; max-width: 450px; overflow: hidden; }
        .m-head { padding: 14px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        .m-body { padding: 20px; }

        /* Messenger */
        .msg-grid { height: 550px; display: flex; }
        .u-list { width: 100px; border-right: 1px solid var(--border); overflow-y: auto; }
        .chat { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
        .chat-h { padding: 12px 20px; border-bottom: 1px solid var(--border); font-weight: 800; background: var(--surface); }
        .chat-m { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 80%; padding: 10px 16px; border-radius: 20px; font-size: 14px; line-height: 1.4; box-shadow: var(--shadow); }
        .bubble.me { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .bubble.them { background: var(--surface); color: var(--text); align-self: flex-start; border-bottom-left-radius: 4px; }

        /* Profile */
        .prof-top { display: flex; align-items: center; gap: 40px; padding: 20px; margin-bottom: 30px; }
        .prof-img { width: 100px; height: 100px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 800; border: 1px solid var(--border); }
        .prof-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 4px; }
        .grid-item { aspect-ratio: 1; background: #eee; cursor: pointer; overflow: hidden; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Toast */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #262626; color: white; padding: 14px 28px; border-radius: 12px; font-weight: 600; z-index: 5000; display: none; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
    </style>
</head>
<body>

    <!-- AUTH -->
    <div id="v-auth" class="auth-view">
        <div class="auth-box" id="box-login">
            <h1 class="logo">Snappic</h1>
            <p id="err-login" style="color: var(--accent); font-size: 12px; margin-bottom: 10px;"></p>
            <input type="email" id="in-email" class="inp" placeholder="Email address">
            <input type="password" id="in-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="handleLogin()">Log In</button>
            <div class="switch">Don't have an account? <span onclick="toggleAuth()">Sign up</span></div>
        </div>
        <div class="auth-box hidden" id="box-signup">
            <h1 class="logo">Snappic</h1>
            <p id="err-signup" style="color: var(--accent); font-size: 12px; margin-bottom: 10px;"></p>
            <input type="text" id="up-user" class="inp" placeholder="Username">
            <input type="email" id="up-email" class="inp" placeholder="Email address">
            <input type="password" id="up-pass" class="inp" placeholder="Password">
            <button class="btn" onclick="handleSignup()">Sign Up</button>
            <div class="switch">Already have an account? <span onclick="toggleAuth()">Log in</span></div>
        </div>
    </div>

    <!-- MAIN -->
    <div id="v-app" class="hidden">
        <nav class="navbar">
            <div class="nav-inner">
                <a href="#" class="logo" onclick="loadFeed()">Snappic</a>
                <div class="nav-actions">
                    <i class='bx bxs-home' onclick="loadFeed()"></i>
                    <i class='bx bx-plus-square' onclick="openCreate()"></i>
                    <i class='bx bx-message-rounded-dots' onclick="openMsgs()"></i>
                    <i class='bx bx-user-circle' onclick="openMe()"></i>
                    <i class='bx bx-moon' onclick="toggleDark()"></i>
                    <i class='bx bx-log-out' onclick="handleLogout()"></i>
                </div>
            </div>
        </nav>

        <main class="app-container">
            <div class="feed-col">
                <div class="stories" id="stories-list"></div>
                <div id="feed-list"></div>
            </div>

            <aside class="sidebar">
                <div class="side-me">
                    <div class="big-avatar" id="side-av">?</div>
                    <div style="flex:1">
                        <div id="side-un" style="font-weight:700; font-size:14px;">username</div>
                        <div id="side-fn" style="color:var(--muted); font-size:14px;">Full Name</div>
                    </div>
                </div>
                <div style="font-size:12px; color:var(--muted); margin-top:30px; letter-spacing:1px; font-weight:600;">
                    © 2024 SNAPPIC PREMIUM
                </div>
            </aside>
        </main>
    </div>

    <!-- MODALS -->
    <div class="overlay" id="overlay">
        <!-- Create -->
        <div class="m-card hidden" id="m-create">
            <div class="m-head"><span>Create New Post</span><i class='bx bx-x' onclick="closeM()"></i></div>
            <div class="m-body">
                <div id="prev-box" style="margin-bottom:15px; display:none;"><img id="prev-img" style="width:100%; border-radius:12px;"></div>
                <label for="f-img" style="display:block; padding:15px; background:#efefef; border-radius:12px; text-align:center; cursor:pointer; font-weight:700;">Select Photo</label>
                <input type="file" id="f-img" accept="image/*" hidden onchange="doPrev(this)">
                <textarea id="f-cap" class="inp" style="height:120px; resize:none; margin-top:15px;" placeholder="Write a caption..."></textarea>
                <button class="btn" onclick="postIt()" id="btn-share">Share Post</button>
            </div>
        </div>

        <!-- Profile -->
        <div class="m-card hidden" id="m-prof" style="max-width:700px;">
            <div class="m-head"><span id="p-title">Profile</span><i class='bx bx-x' onclick="closeM()"></i></div>
            <div class="m-body" style="padding:0">
                <div class="prof-top">
                    <div class="prof-img" id="p-av">?</div>
                    <div style="flex:1">
                        <h2 id="p-un" style="margin-bottom:10px;">username</h2>
                        <div style="display:flex; gap:20px; font-size:14px; margin-bottom:15px;">
                            <span><b id="p-cnt-p">0</b> posts</span>
                            <span><b id="p-cnt-fr">0</b> followers</span>
                            <span><b id="p-cnt-fg">0</b> following</span>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn" id="p-follow" style="margin:0; width:120px;">Follow</button>
                            <button class="btn" id="p-msg" style="margin:0; width:120px; background:#efefef; color:black;">Message</button>
                        </div>
                    </div>
                </div>
                <div class="prof-grid" id="p-grid"></div>
            </div>
        </div>

        <!-- Messenger -->
        <div class="m-card hidden" id="m-msg" style="max-width:800px;">
            <div class="m-head"><span>Direct</span><i class='bx bx-x' onclick="closeM()"></i></div>
            <div class="msg-grid">
                <div class="u-list" id="conv-list"></div>
                <div class="chat">
                    <div id="chat-head" class="chat-h">Messenger</div>
                    <div id="chat-main" class="chat-m"></div>
                    <div id="chat-in" class="cmt-box hidden" style="background:var(--surface)">
                        <input type="text" id="msg-t" placeholder="Message..." onkeypress="if(event.key==='Enter') sendD()">
                        <button onclick="sendD()"><i class='bx bxs-send' style="font-size:24px"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Action completed!</div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
    <script>
        function toggleDark() {
            const b = document.body;
            const dark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', dark ? 'light' : 'dark');
            const i = document.querySelector('.bx-moon, .bx-sun');
            i.classList.toggle('bx-moon'); i.classList.toggle('bx-sun');
        }
    </script>
</body>
</html>
